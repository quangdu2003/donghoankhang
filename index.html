<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bảo trì website</title>

  <link rel="icon" type="image/jpeg" href="./icon.jpg">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#fff;
      font-family:Arial,sans-serif;
    }

    .wrapper{
      width:100%;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#fff;
    }

    .banner-desktop,
    .banner-mobile{
      width:100%;
      height:100vh;

      object-fit:contain;

      display:block;
    }

    /* Desktop */
    .banner-mobile{
      display:none;
    }

    /* Mobile */
    @media screen and (max-width:768px){

      .banner-desktop{
        display:none;
      }

      .banner-mobile{
        display:block;
      }

    }

  </style>
</head>

<body>

  <div class="wrapper">

    <!-- Desktop -->
    <img
      src="./banner.jpg"
      alt="Maintenance"
      class="banner-desktop"
    >

    <!-- Mobile -->
    <img
      src="./banner_m.jpg"
      alt="Maintenance Mobile"
      class="banner-mobile"
    >

  </div>

</body>
</html>
