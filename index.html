<!DOCTYPE html>
<html lang="vi">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Bảo trì website</title>

  <!-- =========================
       FAVICON
  ========================== -->

  <!-- PNG favicon -->
  <link
    rel="icon"
    type="image/png"
    sizes="512x512"
    href="./favicon.png?v=3"
  />

  <!-- Apple -->
  <link
    rel="apple-touch-icon"
    href="./favicon.png?v=3"
  />

  <!-- Theme color -->
  <meta
    name="theme-color"
    content="#ffffff"
  />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:Arial,sans-serif;
    }

    body{
      position:relative;
    }

    /* =========================
       Banner chung
    ========================== */

    .banner{

      position:absolute;
      inset:0;

      width:100vw;
      height:100vh;

      display:block;

      /*
        Không crop nội dung
      */

      object-fit:contain;

      object-position:center center;

      background:#ffffff;

      user-select:none;
      pointer-events:none;

      -webkit-user-drag:none;

      image-rendering:auto;

      backface-visibility:hidden;

      transform:translate3d(0,0,0);

    }

    /* =========================
       Desktop
       1672 x 941
    ========================== */

    .desktop-banner{
      display:block;
    }

    .mobile-banner{
      display:none;
    }

    @media screen and (min-width:769px){

      .desktop-banner{

        display:block;

        width:100vw;
        height:100vh;

        object-fit:contain;

        object-position:center center;

      }

      .mobile-banner{
        display:none;
      }

    }

    /* =========================
       Mobile
       941 x 1672
    ========================== */

    @media screen and (max-width:768px){

      .desktop-banner{
        display:none;
      }

      .mobile-banner{

        display:block;

        width:100vw;
        height:100vh;

        object-fit:contain;

        object-position:center top;

      }

    }

    /* =========================
       Chống blur ảnh
    ========================== */

    img{

      image-rendering:auto;

      backface-visibility:hidden;

      transform:translateZ(0);

    }

    /* =========================
       iPhone Safe Area
    ========================== */

    @supports (padding:max(0px)){

      body{
        padding:
          env(safe-area-inset-top)
          env(safe-area-inset-right)
          env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }

    }

  </style>

</head>

<body>

  <!-- ========================= -->
  <!-- Desktop Banner -->
  <!-- 1672 x 941 -->
  <!-- ========================= -->

  <img
    src="./banner.jpg"
    alt="Maintenance Desktop"
    class="banner desktop-banner"
    draggable="false"
  />

  <!-- ========================= -->
  <!-- Mobile Banner -->
  <!-- 941 x 1672 -->
  <!-- ========================= -->

  <img
    src="./banner_m.jpg"
    alt="Maintenance Mobile"
    class="banner mobile-banner"
    draggable="false"
  />

</body>

</html>
