<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Bảo trì website</title>

  <link rel="icon" type="image/jpeg" href="./icon.jpg" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:Arial,sans-serif;
    }

    body{
      position:relative;
    }

    /* =========================
       Banner chung
    ========================== */

    .banner{
      position:absolute;
      inset:0;

      width:100%;
      height:100%;

      display:block;

      object-fit:contain;

      /*
        QUAN TRỌNG:
        contain sẽ KHÔNG crop nội dung
      */

      object-position:center center;

      user-select:none;
      pointer-events:none;

      -webkit-user-drag:none;

      background:#fff;
    }

    /* =========================
       Desktop
       1672 x 941
    ========================== */

    .desktop-banner{
      display:block;
    }

    .mobile-banner{
      display:none;
    }

    @media screen and (min-width:769px){

      .desktop-banner{

        /*
          KHÔNG crop
          luôn hiện full nội dung
        */

        object-fit:contain;

        /*
          Căn giữa đẹp
        */

        object-position:center center;

        /*
          Tối ưu ảnh desktop
        */

        width:100vw;
        height:100vh;
      }

    }

    /* =========================
       Mobile
       941 x 1672
    ========================== */

    @media screen and (max-width:768px){

      .desktop-banner{
        display:none;
      }

      .mobile-banner{
        display:block;

        /*
          Không crop mobile
        */

        object-fit:contain;

        /*
          Mobile đẹp hơn khi top
        */

        object-position:center top;

        width:100vw;
        height:100vh;
      }

    }

    /* =========================
       Chống blur ảnh
    ========================== */

    img{
      image-rendering:auto;
      backface-visibility:hidden;
      transform:translate3d(0,0,0);
    }

    /* =========================
       iPhone safe area
    ========================== */

    @supports (padding:max(0px)){

      body{
        padding:
          env(safe-area-inset-top)
          env(safe-area-inset-right)
          env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }

    }

  </style>

</head>

<body>

  <!-- ========================= -->
  <!-- Desktop -->
  <!-- 1672 x 941 -->
  <!-- ========================= -->

  <img
    src="./banner.jpg"
    alt="Desktop Banner"
    class="banner desktop-banner"
    draggable="false"
  />

  <!-- ========================= -->
  <!-- Mobile -->
  <!-- 941 x 1672 -->
  <!-- ========================= -->

  <img
    src="./banner_m.jpg"
    alt="Mobile Banner"
    class="banner mobile-banner"
    draggable="false"
  />

</body>
</html>
