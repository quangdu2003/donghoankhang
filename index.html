<!DOCTYPE html>
<html lang="vi">
<head>

  <meta charset="UTF-8" />

  <!-- Responsive -->
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Bảo trì website</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="./icon.jpg" />

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,
    body{
      width:100%;
      height:100%;
      overflow:hidden;
      background:#ffffff;
      font-family:Arial,sans-serif;
    }

    body{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* ===== Banner chung ===== */

    .banner{
      position:fixed;
      inset:0;

      width:100vw;
      height:100vh;

      object-fit:cover;
      object-position:center center;

      display:block;

      user-select:none;
      pointer-events:none;

      -webkit-user-drag:none;

      background:#fff;
    }

    /* ===== Desktop ===== */

    .desktop-banner{
      display:block;
    }

    .mobile-banner{
      display:none;
    }

    /*
      Desktop chuẩn:
      1920 x 1080
      Tỷ lệ 16:9
    */

    @media screen and (min-width:769px){

      .desktop-banner{

        /*
          Giữ đúng tỷ lệ desktop
          và fit đẹp mọi màn hình
        */

        object-fit:cover;

        /*
          Có thể chỉnh:
          center top
          center center
          center bottom
        */

        object-position:center center;
      }

    }

    /* ===== Mobile ===== */

    /*
      Mobile chuẩn:
      1080 x 1920
      Tỷ lệ 9:16
    */

    @media screen and (max-width:768px){

      .desktop-banner{
        display:none;
      }

      .mobile-banner{
        display:block;

        object-fit:cover;

        /*
          Mobile thường đẹp hơn khi top
        */

        object-position:center top;
      }

    }

    /* ===== iPhone Safe Area ===== */

    @supports (padding:max(0px)){

      body{
        padding:
          env(safe-area-inset-top)
          env(safe-area-inset-right)
          env(safe-area-inset-bottom)
          env(safe-area-inset-left);
      }

    }

    /* ===== Chống zoom ảnh mờ ===== */

    img{
      image-rendering:auto;
      backface-visibility:hidden;
      transform:translateZ(0);
    }

  </style>

</head>

<body>

  <!-- ========================= -->
  <!-- Desktop 1920x1080 16:9 -->
  <!-- ========================= -->

  <img
    src="./banner.jpg"
    alt="Maintenance Desktop"
    class="banner desktop-banner"
    draggable="false"
  />

  <!-- ========================= -->
  <!-- Mobile 1080x1920 9:16 -->
  <!-- ========================= -->

  <img
    src="./banner_m.jpg"
    alt="Maintenance Mobile"
    class="banner mobile-banner"
    draggable="false"
  />

</body>
</html>
